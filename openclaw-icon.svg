<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="claw" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff"/>
      <stop offset="100%" style="stop-color:#0099cc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" stroke="#00d9ff" stroke-width="4"/>
  
  <!-- Outer Ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#00d9ff" stroke-width="2" opacity="0.3"/>
  
  <!-- Claw Mark Design -->
  <g filter="url(#glow)">
    <!-- Main claw slash 1 -->
    <path d="M 180 150 Q 200 200 190 280 Q 185 340 175 380" 
          stroke="url(#claw)" stroke-width="18" fill="none" stroke-linecap="round"/>
    <!-- Main claw slash 2 -->
    <path d="M 230 140 Q 250 200 240 290 Q 235 350 225 390" 
          stroke="url(#claw)" stroke-width="18" fill="none" stroke-linecap="round"/>
    <!-- Main claw slash 3 -->
    <path d="M 280 150 Q 300 210 290 290 Q 285 345 275 385" 
          stroke="url(#claw)" stroke-width="18" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Center Circle -->
  <circle cx="256" cy="256" r="60" fill="none" stroke="#00d9ff" stroke-width="3" opacity="0.5"/>
  
  <!-- Small accent dots -->
  <circle cx="256" cy="180" r="6" fill="#00d9ff"/>
  <circle cx="320" cy="256" r="6" fill="#00d9ff"/>
  <circle cx="256" cy="332" r="6" fill="#00d9ff"/>
  <circle cx="192" cy="256" r="6" fill="#00d9ff"/>
  
  <!-- Text -->
  <text x="256" y="460" font-family="Arial, sans-serif" font-size="28" font-weight="bold" 
        fill="#00d9ff" text-anchor="middle" letter-spacing="4">OPENCLAW</text>
</svg>
