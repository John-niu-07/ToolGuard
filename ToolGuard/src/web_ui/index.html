<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ ToolGuard - 工具调用监控</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .card h2 {
            color: #667eea;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f0f0;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 12px;
        }
        .tab {
            padding: 10px 20px;
            border: none;
            background: #f0f0f0;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        .tab:hover { background: #e0e0e0; }
        .tab.active {
            background: #667eea;
            color: white;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }
        .tool-item {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }
        .tool-item:hover {
            border-color: #667eea;
            box-shadow: 0 2px 4px rgba(102,126,234,0.2);
        }
        .tool-item.blocked {
            background: #fff3cd;
            border-color: #ffc107;
        }
        .tool-name {
            font-weight: 500;
            color: #333;
        }
        .tool-actions {
            display: flex;
            gap: 8px;
        }
        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover { background: #5568d3; }
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        .btn-danger:hover { background: #c82333; }
        .btn-success {
            background: #28a745;
            color: white;
        }
        .btn-success:hover { background: #218838; }
        .btn-warning {
            background: #ffc107;
            color: #333;
        }
        .btn-warning:hover { background: #e0a800; }
        .btn-small {
            padding: 4px 8px;
            font-size: 12px;
        }
        .status-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }
        .status-ok {
            background: #28a745;
            color: white;
        }
        .pending-item {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 6px;
        }
        .pending-item.critical {
            background: #f8d7da;
            border-left-color: #dc3545;
        }
        .pending-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .pending-title {
            font-weight: 600;
            color: #333;
        }
        .risk-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        .risk-low { background: #28a745; color: white; }
        .risk-medium { background: #ffc107; color: #333; }
        .risk-high { background: #fd7e14; color: white; }
        .risk-critical { background: #dc3545; color: white; }
        .pending-details {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
        }
        .pending-actions {
            display: flex;
            gap: 8px;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }
        .refresh-btn {
            background: #667eea;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .refresh-btn:hover { background: #5568d3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ ToolGuard - 工具调用监控系统</h1>
        
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="allowedCount">-</div>
                <div class="stat-label">备选工具集</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="blockedCount">-</div>
                <div class="stat-label">禁止工具集</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="pendingCount">-</div>
                <div class="stat-label">待确认请求</div>
            </div>
        </div>
        
        <!-- 选项卡 -->
        <div class="card">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('task-monitor')">📋 任务监控</button>
                <button class="tab" onclick="switchTab('tool-sets')">🔧 工具集管理</button>
                <button class="tab" onclick="switchTab('pending')">⏳ 待确认请求</button>
            </div>
            
            <!-- 任务监控 -->
            <div id="tab-task-monitor" class="tab-content active">
                <h2>当前任务状态</h2>
                <div id="taskStatus">
                    <div class="empty-state">加载中...</div>
                </div>
                
                <h2 style="margin-top: 32px;">备选工具集（直接执行）</h2>
                <div class="tool-grid" id="taskAllowedTools"></div>
                
                <h2 style="margin-top: 32px;">禁止工具集（需要确认）</h2>
                <div class="tool-grid" id="taskBlockedTools"></div>
            </div>
            
            <!-- 工具集管理 -->
            <div id="tab-tool-sets" class="tab-content">
                <h2>备选工具集（直接执行）</h2>
                <div class="tool-grid" id="allowedTools"></div>
                
                <h2 style="margin-top: 32px;">禁止工具集（需要确认）</h2>
                <div class="tool-grid" id="blockedTools"></div>
            </div>
            
            <!-- 待确认请求 -->
            <div id="tab-pending" class="tab-content">
                <button class="refresh-btn" onclick="loadPending()">🔄 刷新</button>
                <div id="pendingList">
                    <div class="empty-state">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
